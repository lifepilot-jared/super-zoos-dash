<svg viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="40" cy="60" rx="18" ry="28" fill="#d4a574"/>
  
  <!-- Head -->
  <circle cx="40" cy="25" r="16" fill="#d4a574"/>
  
  <!-- Doctor Hat (stethoscope style) -->
  <rect x="28" y="5" width="24" height="6" rx="3" fill="#e8b5d7"/>
  <path d="M 35 11 Q 35 14 40 15 Q 45 14 45 11" fill="#e8b5d7"/>
  
  <!-- Eyes (caring expression) -->
  <circle cx="34" cy="23" r="2.5" fill="#101d2a"/>
  <circle cx="46" cy="23" r="2.5" fill="#101d2a"/>
  <circle cx="34.6" cy="22" r="1" fill="white"/>
  <circle cx="46.6" cy="22" r="1" fill="white"/>
  
  <!-- Smile (warm, friendly) -->
  <path d="M 36 30 Q 40 33 44 30" stroke="#803816" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  
  <!-- Trunk/Snout (elephant feature) -->
  <path d="M 40 32 Q 35 45 32 52" stroke="#c79468" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Ears (elephant) -->
  <ellipse cx="20" cy="35" rx="8" ry="14" fill="#c79468" opacity="0.8"/>
  <ellipse cx="60" cy="35" rx="8" ry="14" fill="#c79468" opacity="0.8"/>
  
  <!-- Arms -->
  <rect x="18" y="50" width="8" height="20" rx="4" fill="#d4a574"/>
  <rect x="54" y="50" width="8" height="20" rx="4" fill="#d4a574"/>
  
  <!-- Legs -->
  <rect x="32" y="85" width="7" height="25" rx="3.5" fill="#8b6a47"/>
  <rect x="41" y="85" width="7" height="25" rx="3.5" fill="#8b6a47"/>
  
  <!-- Heart pendant (doctor's compassion) -->
  <path d="M 40 58 Q 35 52 32 55 Q 30 57 32 60 L 40 68 L 48 60 Q 50 57 48 55 Q 45 52 40 58" fill="#e83e5a" opacity="0.7"/>
</svg>