<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="50" cy="130" rx="35" ry="6" fill="rgba(0,0,0,0.15)"/>
  
  <!-- Legs -->
  <rect x="35" y="95" width="12" height="30" rx="6" fill="#8b3a5c"/>
  <rect x="53" y="95" width="12" height="30" rx="6" fill="#8b3a5c"/>
  
  <!-- Torso (Pink) -->
  <path d="M 30 50 Q 25 60 30 80 L 70 80 Q 75 60 70 50 Q 65 45 50 45 Q 35 45 30 50" fill="#d84d8f"/>
  
  <!-- Arms -->
  <rect x="15" y="55" width="10" height="25" rx="5" fill="#f4c9d8" transform="rotate(-25 20 65)"/>
  <rect x="75" y="55" width="10" height="25" rx="5" fill="#f4c9d8" transform="rotate(25 80 65)"/>
  
  <!-- Head -->
  <circle cx="50" cy="30" r="20" fill="#fce4e8"/>
  
  <!-- Pigtails (Pink) -->
  <circle cx="25" cy="18" r="7" fill="#f9a3c4"/>
  <circle cx="75" cy="18" r="7" fill="#f9a3c4"/>
  
  <!-- Eyes -->
  <circle cx="43" cy="28" r="3" fill="#101d2a"/>
  <circle cx="57" cy="28" r="3" fill="#101d2a"/>
  <circle cx="43.8" cy="27" r="1.2" fill="white"/>
  <circle cx="57.8" cy="27" r="1.2" fill="white"/>
  
  <!-- Big Happy Smile -->
  <path d="M 44 36 Q 50 40 56 36" stroke="rgba(74,63,61,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Rosy cheeks -->
  <circle cx="32" cy="33" r="3.5" fill="rgba(243, 93, 159, 0.3)"/>
  <circle cx="68" cy="33" r="3.5" fill="rgba(243, 93, 159, 0.3)"/>
  
  <!-- Power Badge (J) - shown in super mode via CSS -->
  <g opacity="0" class="power-badge-judy">
    <circle cx="50" cy="62" r="8" fill="white" stroke="#d84d8f" stroke-width="1.5"/>
    <text x="50" y="67" font-size="12" font-weight="bold" fill="#d84d8f" text-anchor="middle">J</text>
  </g>
</svg>