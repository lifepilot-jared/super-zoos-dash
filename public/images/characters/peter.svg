<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="50" cy="130" rx="35" ry="6" fill="rgba(0,0,0,0.15)"/>
  
  <!-- Legs -->
  <rect x="35" y="95" width="12" height="30" rx="6" fill="#0f4c8b"/>
  <rect x="53" y="95" width="12" height="30" rx="6" fill="#0f4c8b"/>
  
  <!-- Torso (Blue) -->
  <path d="M 30 50 Q 25 60 30 80 L 70 80 Q 75 60 70 50 Q 65 45 50 45 Q 35 45 30 50" fill="#1770d7"/>
  
  <!-- Arms -->
  <rect x="15" y="55" width="10" height="25" rx="5" fill="#d3dee3" transform="rotate(-25 20 65)"/>
  <rect x="75" y="55" width="10" height="25" rx="5" fill="#d3dee3" transform="rotate(25 80 65)"/>
  
  <!-- Head -->
  <circle cx="50" cy="30" r="20" fill="#dbe3e7"/>
  
  <!-- Ears (Elephant) -->
  <circle cx="28" cy="25" r="8" fill="#cfd9dd"/>
  <circle cx="28" cy="25" r="5" fill="#ffc7c9"/>
  <circle cx="72" cy="25" r="8" fill="#cfd9dd"/>
  <circle cx="72" cy="25" r="5" fill="#ffc7c9"/>
  
  <!-- Trunk -->
  <path d="M 50 40 Q 45 50 42 62" stroke="#8e6338" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <circle cx="43" cy="28" r="3" fill="#101d2a"/>
  <circle cx="57" cy="28" r="3" fill="#101d2a"/>
  <circle cx="43.8" cy="27" r="1.2" fill="white"/>
  <circle cx="57.8" cy="27" r="1.2" fill="white"/>
  
  <!-- Smile -->
  <path d="M 45 38 Q 50 41 55 38" stroke="rgba(74,63,61,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Hair tuft -->
  <path d="M 42 8 Q 38 5 40 15 Q 42 12 45 15" fill="#803816"/>
  <path d="M 58 8 Q 62 5 60 15 Q 58 12 55 15" fill="#803816"/>
  
  <!-- Power Badge (P) - shown in super mode via CSS -->
  <g opacity="0" class="power-badge-peter">
    <circle cx="50" cy="62" r="8" fill="white" stroke="#1770d7" stroke-width="1.5"/>
    <text x="50" y="67" font-size="12" font-weight="bold" fill="#1770d7" text-anchor="middle">P</text>
  </g>
</svg>