<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-labelledby="title">
  <title id="title">Peter - Elephant Hero</title>
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a8fde;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f5aaa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shadow on ground -->
  <ellipse cx="120" cy="260" rx="58" ry="12" fill="#000000" opacity="0.18"/>
  
  <g filter="url(#shadow)">
    <!-- EARS -->
    <!-- Left ear outer -->
    <ellipse cx="58" cy="52" rx="22" ry="38" fill="#a0a0a0" transform="rotate(-15 58 52)"/>
    <!-- Left ear inner (pink) -->
    <ellipse cx="62" cy="60" rx="12" ry="28" fill="#e8a8b8" transform="rotate(-15 62 60)"/>
    
    <!-- Right ear outer -->
    <ellipse cx="182" cy="52" rx="22" ry="38" fill="#a0a0a0" transform="rotate(15 182 52)"/>
    <!-- Right ear inner (pink) -->
    <ellipse cx="178" cy="60" rx="12" ry="28" fill="#e8a8b8" transform="rotate(15 178 60)"/>
    
    <!-- HEAD (gray) -->
    <ellipse cx="120" cy="95" rx="52" ry="54" fill="#b8b8b8"/>
    
    <!-- HAIR/SPIKY TOP (brown) -->
    <circle cx="95" cy="65" r="8" fill="#7a5230"/>
    <circle cx="105" cy="58" r="9" fill="#8a6240"/>
    <circle cx="120" cy="54" r="10" fill="#7a5230"/>
    <circle cx="135" cy="58" r="9" fill="#8a6240"/>
    <circle cx="145" cy="65" r="8" fill="#7a5230"/>
    
    <!-- FACE/SNOUT (lighter gray) -->
    <ellipse cx="120" cy="110" rx="40" ry="38" fill="#d0d0d0"/>
    
    <!-- EYES -->
    <circle cx="98" cy="92" r="12" fill="#ffffff"/>
    <circle cx="142" cy="92" r="12" fill="#ffffff"/>
    <circle cx="100" cy="95" r="8" fill="#1a1a1a"/>
    <circle cx="144" cy="95" r="8" fill="#1a1a1a"/>
    <circle cx="102" cy="91" r="3" fill="#ffffff"/>
    <circle cx="146" cy="91" r="3" fill="#ffffff"/>
    
    <!-- TRUNK (elephant proboscis) -->
    <path d="M 120 130 Q 125 155 128 175 Q 130 185 132 200" 
          fill="none" stroke="#b8b8b8" stroke-width="16" stroke-linecap="round"/>
    <path d="M 120 130 Q 115 155 112 175 Q 110 185 108 200" 
          fill="none" stroke="#b8b8b8" stroke-width="14" stroke-linecap="round"/>
    
    <!-- NOSE on trunk -->
    <circle cx="120" cy="205" r="8" fill="#b8b8b8"/>
    <circle cx="120" cy="205" r="5" fill="#904030"/>
    
    <!-- SMILE/MOUTH -->
    <path d="M 108 125 Q 120 135 132 125" fill="none" stroke="#7a7a7a" stroke-width="3" stroke-linecap="round"/>
    
    <!-- CHEEKS (rosy) -->
    <circle cx="75" cy="110" r="10" fill="#e8a8b8" opacity="0.6"/>
    <circle cx="165" cy="110" r="10" fill="#e8a8b8" opacity="0.6"/>
    
    <!-- BODY (blue suit) -->
    <rect x="68" y="145" width="104" height="90" rx="24" fill="url(#suitGrad)"/>
    
    <!-- CHEST ARMOR/EMBLEM (P shield) -->
    <ellipse cx="120" cy="170" rx="30" ry="32" fill="#e0e0e0" stroke="#999999" stroke-width="3"/>
    <text x="120" y="182" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#0f5aaa" text-anchor="middle">P</text>
    
    <!-- LEFT ARM -->
    <rect x="45" y="160" width="22" height="72" rx="11" fill="#c8c8c8" transform="rotate(-20 56 160)"/>
    
    <!-- RIGHT ARM -->
    <rect x="173" y="160" width="22" height="72" rx="11" fill="#c8c8c8" transform="rotate(20 184 160)"/>
    
    <!-- LEFT LEG -->
    <rect x="82" y="228" width="28" height="48" rx="14" fill="#0844a3"/>
    
    <!-- RIGHT LEG -->
    <rect x="130" y="228" width="28" height="48" rx="14" fill="#0844a3"/>
    
    <!-- LEFT SHOE (blue) -->
    <ellipse cx="96" cy="265" rx="18" ry="10" fill="#0f5aaa"/>
    <ellipse cx="96" cy="262" rx="16" ry="6" fill="#2a8fde"/>
    
    <!-- RIGHT SHOE (blue) -->
    <ellipse cx="144" cy="265" rx="18" ry="10" fill="#0f5aaa"/>
    <ellipse cx="144" cy="262" rx="16" ry="6" fill="#2a8fde"/>
    
    <!-- TAIL (small, brown) -->
    <path d="M 175 220 Q 188 215 195 225" fill="none" stroke="#7a5230" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>